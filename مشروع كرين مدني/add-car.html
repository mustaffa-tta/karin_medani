<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إضافة سيارة - كرين مدني</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-logo">كرين <span>مدني</span></a>
        <div class="nav-links" id="navLinks">
            <a href="index.html">الرئيسية</a>
            <a href="about.html">عن الموقع</a>
            <a href="cars.html" class="active">السيارات</a>
            <a href="contact.html">تواصل</a>
            <a href="login.html" class="nav-cta">تسجيل خروج</a>
        </div>
        <div class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <div class="page-hero">
        <h1><i class="fas fa-plus-circle"></i> إضافة سيارة جديدة</h1>
        <p>أدخل بيانات السيارة (وهمي – للعرض فقط)</p>
    </div>

    <section class="section section-light">
        <div class="container" style="max-width:600px;">
            <div style="background:white; border-radius:16px; padding:30px; box-shadow:var(--shadow-sm);">
                <div style="background:#d4edda; color:#155724; padding:12px; border-radius:8px; margin-bottom:16px;">✅ تمت إضافة السيارة بنجاح (وهمي).</div>
                <form>
                    <div class="form-group"><label>الماركة</label><input type="text" placeholder="تويوتا" disabled /></div>
                    <div class="form-group"><label>الموديل</label><input type="text" placeholder="كوريلا" disabled /></div>
                    <div class="form-group"><label>السنة</label><input type="number" placeholder="2007" disabled /></div>
                    <div class="form-group"><label>السعر (جنيه سوداني)</label><input type="number" placeholder="75000000" disabled /></div>
                    <div class="form-group"><label>المدينة</label><input type="text" placeholder="مدني" disabled /></div>
                    <div class="form-group"><label>اسم ملف الصورة</label><input type="text" placeholder="2005.jpg" disabled /></div>
                    <div class="form-group"><label>الوصف</label><textarea rows="4" placeholder="وصف السيارة..." disabled></textarea></div>
                    <button type="button" class="btn btn-primary" style="width:100%;" disabled>💾 حفظ السيارة</button>
                </form>
                <div style="margin-top:16px; text-align:center;">
                    <a href="cars.html" class="btn" style="background:#e2e8f0; color:#0A1628;">🔙 العودة إلى القائمة</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">كرين <span>مدني</span></div>
            <p>منصتك الموثوقة لشراء وبيع السيارات المستعملة.</p>
            <div class="social-icons">
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-linkedin-in"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>
            <div class="footer-bottom">
                <span>© 2026 كرين مدني. جميع الحقوق محفوظة.</span>
                <span>🇸🇩 السودان</span>
            </div>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
