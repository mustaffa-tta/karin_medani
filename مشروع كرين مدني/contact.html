<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تواصل - كرين مدني</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-logo">كرين <span>مدني</span></a>
        <div class="nav-links" id="navLinks">
            <a href="index.html">الرئيسية</a>
            <a href="about.html">عن الموقع</a>
            <a href="cars.html">السيارات</a>
            <a href="contact.html" class="active">تواصل</a>
            <a href="login.html" class="nav-cta">دخول</a>
        </div>
        <div class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <div class="page-hero">
        <h1><i class="fas fa-envelope"></i> تواصل معنا</h1>
        <p>نحن هنا للإجابة عن استفساراتك</p>
    </div>

    <section class="section section-light">
        <div class="container">
            <div class="contact-form-card">
                <h3><i class="fas fa-paper-plane"></i> أرسل لنا رسالة</h3>
                <div id="contactMessage"></div>
                <form id="contactForm">
                    <div class="form-group">
                        <label>الاسم</label>
                        <input type="text" id="contactName" placeholder="اسمك الكامل" required />
                    </div>
                    <div class="form-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" id="contactEmail" placeholder="example@domain.com" required />
                    </div>
                    <div class="form-group">
                        <label>الرسالة</label>
                        <textarea id="contactMsg" rows="4" placeholder="اكتب رسالتك هنا..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;">📤 إرسال</button>
                </form>
                <div style="background:#fff3cd; color:#856404; padding:12px; border-radius:8px; margin-top:16px; text-align:center;">
                    🔒 لإرسال رسالة، يرجى <a href="login.html" style="font-weight:bold; color:var(--cyan);">تسجيل الدخول</a> أولاً.
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">كرين <span>مدني</span></div>
            <p>منصتك الموثوقة لشراء وبيع السيارات المستعملة.</p>
            <div class="social-icons">
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-linkedin-in"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>
            <div class="footer-bottom">
                <span>© 2026 كرين مدني. جميع الحقوق محفوظة.</span>
                <span>🇸🇩 السودان</span>
            </div>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
