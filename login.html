<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>دخول - كرين مدني</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-logo">كرين <span>مدني</span></a>
        <div class="nav-links" id="navLinks">
            <a href="index.html">الرئيسية</a>
            <a href="about.html">عن الموقع</a>
            <a href="cars.html">السيارات</a>
            <a href="contact.html">تواصل</a>
            <a href="login.html" class="nav-cta active">دخول</a>
        </div>
        <div class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">كرين <span>مدني</span></div>
            <p class="auth-subtitle">سجل دخولك أو أنشئ حساباً جديداً</p>
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">تسجيل الدخول</button>
                <button class="auth-tab" onclick="switchTab('register')">إنشاء حساب</button>
            </div>
            <div id="loginPanel">
                <div id="loginMessage"></div>
                <form id="loginForm">
                    <div class="form-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" id="loginEmail" placeholder="example@domain.com" required />
                    </div>
                    <div class="form-group">
                        <label>كلمة المرور</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required />
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;">دخول</button>
                </form>
            </div>
            <div id="registerPanel" style="display:none;">
                <div id="registerMessage"></div>
                <form id="registerForm">
                    <div class="form-group">
                        <label>الاسم</label>
                        <input type="text" id="regName" placeholder="اسمك الكامل" required />
                    </div>
                    <div class="form-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" id="regEmail" placeholder="example@domain.com" required />
                    </div>
                    <div class="form-group">
                        <label>كلمة المرور</label>
                        <input type="password" id="regPassword" placeholder="••••••••" required />
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;">إنشاء حساب</button>
                </form>
            </div>
            <div class="auth-footer">© 2026 كرين مدني</div>
        </div>
    </div>

    <footer class="footer" style="margin-top:40px;">
        <div class="footer-content">
            <div class="footer-brand">كرين <span>مدني</span></div>
            <p>منصتك الموثوقة لشراء وبيع السيارات المستعملة.</p>
            <div class="social-icons">
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-linkedin-in"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>
            <div class="footer-bottom">
                <span>© 2026 كرين مدني. جميع الحقوق محفوظة.</span>
                <span>🇸🇩 السودان</span>
            </div>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
